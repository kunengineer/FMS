version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: fleet-postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: fleet_db
      TZ: Asia/Ho_Chi_Minh
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d fleet_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: fleet-backend
    restart: always
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/fleet_db
      - SECRET_KEY=supersecretkeychangeinproduction12345
      - UPLOAD_DIR=uploads
      - TZ=Asia/Ho_Chi_Minh
    ports:
      - "8000:8000"
    volumes:
      - backend_uploads:/app/uploads
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build: ./frontend
    container_name: fleet-frontend
    restart: always
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  postgres_data:
  backend_uploads:
